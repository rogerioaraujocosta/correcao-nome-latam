name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Validate PowerShell installers
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $failed = $false
          foreach ($file in @('scripts/install.ps1', 'scripts/install-from-github.ps1')) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error "${file}: $($_.Message)" }
              $failed = $true
            }
          }
          if ($failed) { exit 1 }
      - name: Validate macOS installers
        if: runner.os == 'macOS'
        run: bash -n scripts/install.sh scripts/install-from-github.sh INSTALAR-MAC.command INICIAR-MAC.command
      - run: npm ci
      - run: npm test
      - run: npm audit --omit=dev --audit-level=high
